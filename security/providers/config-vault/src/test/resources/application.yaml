app:
  # this could be loaded from k8s secrets, defined in env vars, or in system properties
  password: "secret-password"

security:
  providers:
    - name: "config-vault"
      config-vault:
        master-password: "very much secret"
    - name: "config-vault-fallback"
      config-vault:
        master-password: "very much secret"
        legacy-fallback: true
    - name: "config-vault-legacy"
      config-vault:
        master-password: "very much secret"
        legacy-encryption: true
  secrets:
    - name: "password"
      provider: "config-vault"
      config:
        value: "${app.password}"
  encryption:
    - name: "config-vault-default"
      provider: "config-vault"
    - name: "config-vault-override"
      provider: "config-vault"
      config:
        password: "override"
    - name: "config-vault-provider-fallback"
      provider: "config-vault-fallback"
    - name: "config-vault-entry-fallback"
      provider: "config-vault"
      config:
        legacy-fallback: true
    - name: "config-vault-override-fallback"
      provider: "config-vault"
      config:
        password: "override"
        legacy-fallback: true
    - name: "config-vault-provider-legacy"
      provider: "config-vault-legacy"
    - name: "config-vault-entry-legacy-fallback"
      provider: "config-vault"
      config:
        legacy-encryption: true
        legacy-fallback: true
    - name: "config-vault-override-legacy"
      provider: "config-vault"
      config:
        password: "override"
        legacy-encryption: true
