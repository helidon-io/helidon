security:
  providers:
    # Http basic authentication
    # https://tools.ietf.org/html/rfc7617
    - http-basic-auth:
        # If set to true, provider will abstain rather than fail if authentication fails
        # defaults to false
        optional: true
        realm: "helidon"
        # Can be USER or SERVICE
        # defaults to USER
        principal-type: USER
        users:
          - login: "jack"
            password: "${CLEAR=jackIsGreat}"
            roles: ["user", "admin"]
          - login: "jill"
            # master password is "jungle", password is "password"
            password: "${GCM=3XQ8A1RszE9JbXl+lUnnsX0gakuqjnTyp8YJWIAU1D3SiM2TaSnxd6U0/LjrdJYv}"
            roles: ["user"]
