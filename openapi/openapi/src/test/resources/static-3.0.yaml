openapi: 3.0.3
info:
  title: Static 3.0 API
  version: 1.0.0
tags:
  - name: static
    description: Static document operations.
paths:
  /static/{id}:
    get:
      tags:
        - static
      operationId: staticGet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Static response.
          headers:
            X-Request-Id:
              description: Request correlation id.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaticItem"
              examples:
                active:
                  value:
                    id: "42"
                    status: active
components:
  schemas:
    StaticItem:
      type: object
      required:
        - id
      properties:
        id:
          type: string
        status:
          type: string
          nullable: true
          enum:
            - active
            - inactive
        payload:
          type: object
          additionalProperties: true
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
