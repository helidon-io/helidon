# Static content configuration

server:
  features:
    static-content:
      pre-compressed-enabled: false
      pre-compressed-encodings:
        gzip: zz
      temporary-storage:
        directory: "./target/helidon/tmp"
        file-prefix: "helidon-custom"
        file-suffix: ".cache"
        # delete-on-exit: false
      content-types:
        ico: "image/my-icon"
      classpath:
        - context: "/classpath"
          location: "web"
          content-types:
            ico: "image/x-icon"
        - context: "/singleclasspath"
          location: "web/resource.txt"
        - context: "/jar"
          location: "META-INF/services"
      path:
        - context: "/path"
          location: "./src/test/resources/web"
        - context: "/path-enabled"
          location: "./src/test/resources/web"
          pre-compressed-enabled: true
        - context: "/path-empty-encodings"
          location: "./src/test/resources/web"
          pre-compressed-enabled: true
          pre-compressed-encodings: {}
        - context: "/path-custom-encodings"
          location: "./src/test/resources/web"
          pre-compressed-enabled: true
          pre-compressed-encodings:
            gzip: gz
        - context: "/singlepath"
          location: "./src/test/resources/web/resource.txt"
