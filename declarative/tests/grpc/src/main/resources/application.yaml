server:
  protocols:
    grpc:
      enable-metrics: true

grpc:
  grpc-services:
    security:
      enabled: true
    tracing:
      enabled: true
    validation:
      enabled: true

security:
  providers:
    - abac:
    - http-basic-auth:
        users:
          - login: "tomas"
            password: "changeit"
          - login: "admin"
            password: "changeit"
            roles: ["admin"]
          - login: "user"
            password: "changeit"
            roles: ["user"]
