security:
  jersey:
    authorize-annotated-only: true
  providers:
    - http-signatures:
        headers: [ "SIGNATURE" ]
        optional: false
        sign-headers:
          - method: "get"
            always: [ "date", "(request-target)" ]
        inbound:
          keys:
            - key-id: "mp-test-key"
              principal-name: "mp-test-service"
              hmac.secret: "MpTestSecret"
