app:
  greeting: "Hello"

server:
  port: 7076
  host: 0.0.0.0
  features:
    observe:
      observers:
        tracing:
          paths:
            # The in-process mock OTLP collector must not trace its own export traffic.
            - path: "/otlp/*"
              enabled: false

tracing:
  service: "helidon-se"
  global: false
  protocol: "http"
  host: "localhost"
  port: "${server.port}"
  exporter-type: "http/proto"
  span-processor-type: "simple"
  # mocked OTLP/HTTP collector
  path: "/otlp/v1/traces"

client:
  follow-redirects: true
  max-redirects: 5
