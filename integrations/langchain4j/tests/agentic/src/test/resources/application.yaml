langchain4j:
  agents:
    expert-router:
      chat-model: mock
    legal-expert:
      chat-model: mock
    pizza-expert:
      chat-model: mock
    category-router:
      chat-model: mock
      input-guardrails: [no-ananas-guardrail]
    technical-expert:
      chat-model: mock
      input-guardrails: [no-ananas-guardrail]
    medical-expert:
      chat-model: mock
      async: false
      description: test
      output-key: response
      execute-tools-concurrently: false

  mock:
    chat-model:
      enabled: true
      rules:
        - pattern: (.|\n)*You are a pizza expert.(.|\n)*looks kind of like an ananas on pizza(.|\n)*
          response: true
        - pattern: (.|\n)*You are a pizza expert.(.|\n)*pizza with ananas(.|\n)*
          response: true
        - pattern: (.|\n)*You are a pizza expert.(.|\n)*
          response: false
        - pattern: (.|\n)*categorize it as 'legal', 'medical' or 'technical'(.|\n)*weird rash on my skin(.|\n)*
          response: medical
        - pattern: (.|\n)*categorize it as 'legal', 'medical' or 'technical'(.|\n)*construct an oven(.|\n)*
          response: technical
        - pattern: (.|\n)*You are a medical expert(.|\n)*I have a weird rash on my skin(.|\n)*
          response: You should find a medical attention!
        - pattern: (.|\n)*You are a technical expert(.|\n)*How do I construct an oven(.|\n)*
          response: Get some tools and lets build!
