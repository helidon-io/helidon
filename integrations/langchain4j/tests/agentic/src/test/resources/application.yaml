langchain4j:
  agents:
    flavor-classifier:
      chat-model: test-mock-model
    helidon-se-expert:
      chat-model: test-mock-model
      output-guardrails:
        - io.helidon.integrations.langchain4j.tests.agentic.NonMPOutputGuardrail
    helidon-mp-expert:
      chat-model: test-mock-model
      input-guardrails:
        - io.helidon.integrations.langchain4j.tests.agentic.ForbiddenWordsInputGuardrail

  models:
    test-mock-model:
      provider: mock
      enabled: true
      rules:
        - pattern: (.|\n)*categorize it(.|\n)*JAX-RS(.|\n)*
          response: MP
        - pattern: (.|\n)*JAX-RS(.|\n)*
          response: I am MP expert!
        - pattern: (.|\n)*categorize it(.|\n)*imperative(.|\n)*
          response: SE
        - pattern: (.|\n)*RETRY!(.|\n)*
          response: I am SE expert after retry!
        - pattern: (.|\n)*please retry me req(.|\n)*
          response: please retry me res
        - pattern: (.|\n)*imperative(.|\n)*
          response: I am SE expert!